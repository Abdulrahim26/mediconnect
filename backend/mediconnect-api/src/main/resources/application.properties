spring.application.name=mediconnect-api

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/mediconnect
spring.datasource.username=postgres
spring.datasource.password=abdul

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# SERVER
# ===============================
server.port=8080

jwt.secret=mediconnectSuperSecretKeyForJwtAuthenticationSystem2026SecureKey
jwt.expiration=86400000

logging.level.org.springframework.security=DEBUG